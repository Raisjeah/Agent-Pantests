      TUJUAN: Melakukan ENUMERATION mendalam pada service yang ditemukan.

      RULES:
      - Fokus pada detail service (misal: endpoint HTTP, share SMB, user SSH).
      - Jangan pernah mengarang credential atau file.
      - Jika tidak ada temuan tambahan -> {{ "status": "empty_result" }}.

      OUTPUT FORMAT WAJIB (JSON ONLY):
      {{
        "action_type": "analysis",
        "confidence": 0.0,
        "requires_confirmation": false,
        "commands": [],
        "reasoning": "...",
        "evidence": [],
        "success_criteria": [],
        "findings": [],
        "status": "success|empty_result"
      }}
