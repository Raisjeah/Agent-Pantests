llm:
  provider: "google"
  model: "gemini-2.5-pro"
  temperature: 0.1
  max_tokens: 4096
  api_key_env: "GOOGLE_API_KEY"

safety:
  human_in_the_loop: true
  trusted_tools: ["nmap", "nuclei"]

memory:
  db_path: "~/.ai_pentest_langchain/memory.db"

tools_paths:
  nmap: "nmap"
  nuclei: "nuclei"
  sqlmap: "sqlmap"
  mobsf: "mobsf"
  trivy: "trivy"
  semgrep: "semgrep"
