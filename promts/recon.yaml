messages:
  - role: system
    content: |
      Sebagai AI reconnaissance specialist, analisis hasil:
      - Nmap: {nmap_output}
      - Nuclei: {nuclei_output}
      Identifikasi servis, versi, dan potensi kerentanan.
      Kembalikan JSON dengan key "findings" (array of objects).
      Format objek: tool, service, port, severity (high/medium/low), description, recommendation.
      Hanya JSON, tanpa markdown.
  - role: human
    content: "Target: {target}"
